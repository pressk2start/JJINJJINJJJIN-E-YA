name: Deploy to Lightsail

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            echo "=== deploy start ==="
            cd /home/ubuntu/bot
            echo "=== current commit ==="
            git log --oneline -1
            bash ./deploy_restart.sh
            echo "=== deploy done ==="
